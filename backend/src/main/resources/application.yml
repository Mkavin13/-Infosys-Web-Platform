server:
  port: 8081

spring:
  application:
    name: carbontrack-backend
  profiles:
    active: mysql
  jackson:
    date-format: yyyy-MM-dd
    time-zone: UTC

jwt:
  # Base64-encoded 256-bit key: "carbontracksustainabilityanalyticsplatform2026secretkey"
  secret: Y2FyYm9udHJhY2tzdXN0YWluYWJpbGl0eWFuYWx5dGljc3BsYXRmb3JtMjAyNnNlY3JldGtleQ==
  expiration: 86400000 # 24 hours (in milliseconds)
  refresh-expiration: 604800000 # 7 days (in milliseconds)

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

---
# Development Profile (File-based H2 Database for persistence)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./database/carbontrack;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password: Crazy_kavin13
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    baseline-on-migrate: true

---
# MySQL Production/Local Profile
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://localhost:3306/carbontrack?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:Crazy_kavin13}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
