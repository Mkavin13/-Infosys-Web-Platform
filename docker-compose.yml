version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: carbontrack-db
    restart: always
    environment:
      MYSQL_DATABASE: carbontrack
      MYSQL_USER: carbontrack_user
      MYSQL_PASSWORD: carbontrack_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
